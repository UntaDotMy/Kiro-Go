services:
  kiro-go-patch:
    # When testing locally with `docker compose up --build`, this builds from
    # source. For deployments, comment out `build:` and uncomment `image:`
    # below to pull the prebuilt fork image from ghcr.io.
    build: .
    # image: ghcr.io/untadotmy/kiro-go:latest
    container_name: kiro-go-patch
    pull_policy: always
    ports:
      # Host 8989 -> container 8080. Bound to LOOPBACK so the cleartext-HTTP Go
      # process is never directly reachable from the network — a TLS-terminating
      # reverse proxy (see DEPLOYMENT.md) is expected to front it on 443. Widen to
      # "8989:8080" deliberately only if you are running without a front proxy.
      - "127.0.0.1:8989:8080"
    volumes:
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
    restart: unless-stopped
    # The binary runs a 30s graceful drain on SIGTERM (main.go) to let in-flight
    # streams finish. Docker's default stop grace is only 10s, which would SIGKILL
    # a stream still draining between 10s and 30s. Give the drain its full budget
    # plus a small margin.
    stop_grace_period: 35s
